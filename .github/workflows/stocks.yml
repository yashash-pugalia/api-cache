name: Stocks

on:
  push:
    branches: [main]

  schedule:
    - cron: "5 10 * * 1-5"

  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  Main:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Extract and Save Data
        run: |
          curl -s https://www.nseindia.com/api/equity-stockIndices?index=NIFTY%20500 | \
          jq '.data' > stocks.json

      - uses: actions/upload-pages-artifact@v1
        with:
          path: stocks.json

      - id: deployment
        uses: actions/deploy-pages@v1
